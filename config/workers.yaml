# ============================================================================
# ADAN Workers Configuration - Temporal Specialization ONLY
# ============================================================================
# Workers define: timeframes, trade frequency, agent hyperparams, regime params
# Capital Tiers (in config.yaml) define: exposure_range, risk_per_trade_pct
# A worker's risk_per_trade_pct_by_tier provides tier-indexed overrides.
# ============================================================================

tiers:
  micro:
    capital_range:
    - 11
    - 30
    exposure_range:
    - 70
    - 90
    description: Micro Capital (11-30 USDT) - High exposure, survival mode
  small:
    capital_range:
    - 30
    - 100
    exposure_range:
    - 35
    - 75
    description: Small Capital (30-100 USDT) - Growth phase
  medium:
    capital_range:
    - 100
    - 300
    exposure_range:
    - 45
    - 60
    description: Medium Capital (100-300 USDT) - Balanced
  high:
    capital_range:
    - 300
    - 1000
    exposure_range:
    - 20
    - 35
    description: High Capital (300-1000 USDT) - Conservative
  enterprise:
    capital_range:
    - 1000
    - null
    exposure_range:
    - 5
    - 15
    description: Enterprise (1000+ USDT) - Institutional-grade
workers:
  w1:
    profile: conservative
    tier: 1
    max_positions: 1
    force_trade:
      5m: 144
      1h: 12
      4h: 3
    daily_max_forced_trades: 30
    tier_position_ratio: 0.0
    agent_config:
      ent_coef: 0.008
      learning_rate: 8e-5
      batch_size: 64
      n_steps: 2048
      n_epochs: 10
      clip_range: 0.15
    assets:
    - BTCUSDT
    - ETHUSDT
    data_split: train
    dbe_config:
      market_regime_detection:
        adx_threshold: 25
        rsi_overbought: 70
        rsi_oversold: 30
        atr_multiplier: 1.8
        ema_fast: 20
        ema_slow: 50
      regime_parameters:
        bull:
          sl_multiplier: 1.1
          tp_multiplier: 1.3
          position_size_multiplier: 1.0
        bear:
          sl_multiplier: 0.7
          tp_multiplier: 0.9
          position_size_multiplier: 0.7
        volatile:
          sl_multiplier: 0.6
          tp_multiplier: 0.7
          position_size_multiplier: 0.5
        sideways:
          sl_multiplier: 0.9
          tp_multiplier: 1.1
          position_size_multiplier: 0.6
      risk_management:
        min_trade_value: 11.0
        max_drawdown_pct: 4.0
        max_leverage: 1.0
      volatility_management:
        lookback: 21
        min_volatility: 0.01
        max_volatility: 0.2
    description: Conservative profile focusing on capital preservation with strict risk controls
    model_config:
      cnn_config: 5m
      features:
      - close
      - volume
      - rsi
      - macd
      - bb_upper
      - bb_middle
      - bb_lower
    name: Conservative Trader
    reward_config:
      drawdown_penalty: -0.003
      profit_factor_bonus: 0.15
      sharpe_ratio_bonus: 0.1
      sortino_ratio_bonus: 0.1
      calmar_ratio_bonus: 0.1
      win_rate_bonus: 0.05
      consistency_bonus: 0.1
      holding_penalty: -5.0e-05
      max_drawdown_penalty: -0.005
    risk_parameters:
      position_size_range:
      - 0.02
      - 0.1
      max_drawdown_pct: 0.1
      volatility_lookback: 21
      max_concurrent_trades: 2
    timeframes:
    - 5m
    - 1h
    trading_config:
      position_risk_offset: -0.6
      position_size_offset: -0.8
      stop_loss_pct: 0.01
      take_profit_pct: 0.02
