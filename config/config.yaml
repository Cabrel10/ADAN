general:
  debug_mode: false
  n_jobs: -1
  project_name: ADAN_Trading_Bot
  random_seed: 42
  timezone: UTC
model:
  architecture:
    attention:
      dropout: 0.1
      num_heads: 8
      use_residual: true
    block_a:
      dropout: 0.2
      kernel_size: 3
      leaky_relu_negative_slope: 0.01
      out_channels: 64
      padding: 1
    block_b:
      dropout: 0.3
      multi_scale:
      - 3
      - 5
      - 7
      se_ratio: 8
    head:
      activation: LeakyReLU
      dropout: 0.5
      hidden_units:
      - 256
      - 128
  diagnostics:
    attention_map_dir: ./models/attention_maps
    background: '#1e1e1e'
    bollinger_band: rgba(41, 98, 255, 0.1)
    bollinger_mid: '#2962ff'
    grid: rgba(255, 255, 255, 0.05)
    histogram_down: '#e57373'
    histogram_up: '#81c784'
    ma_long: '#9c27b0'
    ma_medium: '#2196f3'
    ma_short: '#ff9800'
    macd_line: '#4caf50'
    rsi_line: '#ffc107'
    rsi_overbought: rgba(255, 193, 7, 0.2)
    rsi_oversold: rgba(255, 193, 7, 0.2)
