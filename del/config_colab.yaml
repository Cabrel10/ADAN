# Configuration optimisée pour Google Colab
# Utilise 1 seul worker pour éviter les problèmes multiprocessing

training:
  n_envs: 1  # CRITIQUE: 1 seul worker pour Colab
  n_steps: 2048
  batch_size: 64
  learning_rate: 0.0003
  total_timesteps: 100000
  save_freq: 5000
  eval_freq: 10000
  
environment:
  parallel_workers: 1  # CRITIQUE: pas de multiprocessing
  
checkpoints:
  save_freq: 5000
  keep_best: 3
  
logging:
  level: INFO
